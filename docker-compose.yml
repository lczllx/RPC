version: "3.8"

services:
  etcd:
    image: bitnamilegacy/etcd:3.5
    restart: unless-stopped
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://0.0.0.0:2379
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5
    ports:
      - "2379:2379"
    volumes:
      - etcd-data:/etcd-data

  registry:
    build:
      context: .
    image: lcz-rpc:local
    restart: unless-stopped
    depends_on:
      etcd:
        condition: service_healthy
    command: /opt/rpc/bin/test1_registry_server
    environment:
      LCZ_ETCD: http://etcd:2379
    ports:
      - "8080:8080"

  provider:
    build:
      context: .
    image: lcz-rpc:local
    restart: unless-stopped
    depends_on:
      - registry
    command: /opt/rpc/bin/test1_rpc_server
    ports:
      - "8889:8889"

volumes:
  etcd-data:
